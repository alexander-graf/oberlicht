name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libglib2.0-bin \
            libjavascriptcoregtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: wails build -tags webkit2_41

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          cd build/bin
          tar czf oberlicht-${VERSION}-linux-amd64.tar.gz oberlicht
          echo "TARBALL=build/bin/oberlicht-${VERSION}-linux-amd64.tar.gz" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
          generate_release_notes: true
          name: Oberlicht ${{ github.ref_name }}
