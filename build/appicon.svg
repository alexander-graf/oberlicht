<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#1a2e52"/>
      <stop offset="100%" stop-color="#080d1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pane-tl" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="pane-tr" cx="70%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="pane-bl" cx="30%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.15"/>
    </radialGradient>
    <radialGradient id="pane-br" cx="70%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0.1"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Window frame outer -->
  <rect x="66" y="66" width="380" height="310" rx="18"
        fill="none" stroke="#3b82f6" stroke-width="22"/>

  <!-- Window panes -->
  <rect x="88" y="88" width="164" height="133" rx="6" fill="url(#pane-tl)"/>
  <rect x="260" y="88" width="164" height="133" rx="6" fill="url(#pane-tr)"/>
  <rect x="88" y="229" width="164" height="127" rx="6" fill="url(#pane-bl)"/>
  <rect x="260" y="229" width="164" height="127" rx="6" fill="url(#pane-br)"/>

  <!-- Frame cross bars -->
  <rect x="66" y="218" width="380" height="22" fill="#0f1e3a"/>
  <rect x="245" y="66" width="22" height="310" fill="#0f1e3a"/>

  <!-- Window sill -->
  <rect x="44" y="365" width="424" height="22" rx="11" fill="#2563eb" opacity="0.8"/>

  <!-- Light cone on floor -->
  <path d="M 150 387 L 110 468 L 402 468 L 362 387 Z"
        fill="#3b82f6" opacity="0.12"/>
  <path d="M 190 387 L 170 468 L 342 468 L 322 387 Z"
        fill="#93c5fd" opacity="0.18"/>

  <!-- Key symbol -->
  <g filter="url(#blur-glow)">
    <circle cx="256" cy="446" r="28" fill="none" stroke="#fbbf24" stroke-width="13"/>
    <rect x="256" y="439" width="74" height="14" rx="7" fill="#fbbf24"/>
    <rect x="308" y="439" width="13" height="22" rx="6" fill="#fbbf24"/>
    <rect x="330" y="439" width="13" height="17" rx="6" fill="#fbbf24"/>
  </g>

  <!-- Subtle shine on top panes -->
  <rect x="94" y="94" width="60" height="8" rx="4" fill="white" opacity="0.4"/>
  <rect x="266" y="94" width="60" height="8" rx="4" fill="white" opacity="0.3"/>
</svg>
